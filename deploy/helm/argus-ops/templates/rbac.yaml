{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "argus-ops.fullname" . }}-{{ .Values.rbac.profile }}
  labels:
    {{- include "argus-ops.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "events", "namespaces", "services", "persistentvolumes", "persistentvolumeclaims", "resourcequotas", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  {{- if eq .Values.rbac.profile "admin" }}
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["delete", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["patch", "update", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "argus-ops.fullname" . }}-{{ .Values.rbac.profile }}
  labels:
    {{- include "argus-ops.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "argus-ops.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "argus-ops.fullname" . }}-{{ .Values.rbac.profile }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
