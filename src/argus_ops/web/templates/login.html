<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus-Ops Login</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f7f0; color: #003628; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: min(420px, 100%); background: white; border: 1px solid #c8ddd6; border-top: 4px solid #bd975f; border-radius: 8px; padding: 24px; }
    h1 { margin-top: 0; margin-bottom: 8px; }
    p { color: #4d4d4d; margin-top: 0; }
    label { display: block; margin-bottom: 12px; font-size: 14px; }
    input { width: 100%; padding: 10px 12px; margin-top: 6px; border: 1px solid #a8cfc0; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; background: #003628; color: white; border: none; border-radius: 4px; padding: 11px 12px; cursor: pointer; }
    button:hover { background: #00694e; }
    #message { min-height: 20px; margin-top: 12px; color: #c0392b; font-size: 13px; }
    .meta { margin-top: 16px; color: #5a7a6e; font-size: 12px; }
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>Argus-Ops</h1>
    <p>Sign in to access inventory, findings, AI diagnosis, and audit-aware operations.</p>
    <form id="login-form">
      <label>Username
        <input id="username" name="username" autocomplete="username" required>
      </label>
      <label>Password
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign In</button>
    </form>
    <div id="message"></div>
    <div class="meta">Version {{ version }}</div>
  </section>
</main>
<script>
const form = document.getElementById('login-form');
const message = document.getElementById('message');
form.addEventListener('submit', async (event) => {
  event.preventDefault();
  message.textContent = '';
  const payload = {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value,
  };
  const response = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await response.json();
  if (!response.ok) {
    message.textContent = data.detail || 'Login failed';
    return;
  }
  window.location.href = '/';
});
</script>
</body>
</html>
