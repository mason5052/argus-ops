name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,auth]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest tests/test_auth.py tests/test_api.py tests/test_cli.py

      - name: Check docs drift
        run: pytest -q tests/test_docs_drift.py

  security-and-policy:
    name: Security and public repository policy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,auth]"

      - name: Secret pattern scan
        shell: bash
        run: |
          set -euo pipefail
          matches="$(git grep -n -I -E 'AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]+|-----BEGIN( RSA| EC| OPENSSH| DSA| PGP)? PRIVATE KEY-----|xox[baprs]-|AIza[0-9A-Za-z_-]{35}' -- . ':!README.md' ':!SECURITY.md' || true)"
          if [[ -n "$matches" ]]; then
            echo "Potential secret material found in the public repository:"
            echo "$matches"
            exit 1
          fi

      - name: Public repository policy checks
        shell: bash
        run: |
          set -euo pipefail

          ip_hits="$(git grep -n -I -E '\b10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b|\b192\.168\.[0-9]{1,3}\.[0-9]{1,3}\b|\b172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}\b' -- . || true)"
          if [[ -n "$ip_hits" ]]; then
            echo "Internal IP addresses must not appear in the public repository."
            echo "$ip_hits"
            exit 1
          fi

          enterprise_hits="$(git grep -n -I -E 'node-pool:[[:space:]]*dashboard|ssh://10\.1\.1\.56|10\.1\.1\.81|10\.1\.1\.56|\bzinus\b' -- . || true)"
          if [[ -n "$enterprise_hits" ]]; then
            echo "Enterprise-specific identifiers must not appear in the public repository."
            echo "$enterprise_hits"
            exit 1
          fi

          manifest_hits="$(grep -n -E 'type:[[:space:]]*NodePort|nodePort:' deploy/k8s/deployment.yaml || true)"
          if [[ -n "$manifest_hits" ]]; then
            echo "The public Kubernetes example manifest must stay free of fixed NodePort exposure."
            echo "$manifest_hits"
            exit 1
          fi

      - name: Security scan with bandit
        run: bandit -r src/ -c pyproject.toml -ll
